  <div class="container">
    <div class="row">
      <div class="col-md-6">
        <h3>Add Expense</h3>
        <form id="expenseForm">
          <div class="form-group">
            <label for="date">Date</label>
            <input class="form-control" type="datetime-local" name="date" id="date">
          </div>
          <div class="form-group">
            <label for="expensename">Expense name</label>
            <input class="form-control" type="text" name="expensename" id="expensename">
          </div>
          <div class="form-group">
            <label for="amount">Expense Amount</label>
            <input class="form-control" type="number" min="0" name="amount" id="amount">
          </div>
          <div class="form-group">
            <label for="salary">Salary Amount:</label>
            <input class="form-control" type="number" id="salary" required><br>
          </div>
          <div class="form-group">
            <label for="paymode">Payment Method</label>
            <select class="form-control" name="paymode" id="paymode">
              <option selected hidden>Pay-Mode</option>
              <option value="cash">Cash</option>
              <option value="debitcard">Debit Card</option>
              <option value="creditcard">Credit Card</option>
              <option value="epayment">E-Payment</option>
              <option value="onlinebanking">Online Banking</option>
            </select>
          </div>
          <input class="btn btn-danger" type="submit" value="Add" id="submit">
        </form>
      </div>
      <div style="position: relative; left: 590px; top: -460px;" class="imagge">
        <img width="90%" height="90%" src="/images/planning.jpg" class="rounded float-left" alt="...">
      </div>
    </div>   
  </div>  

  <script>
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let salary = JSON.parse(localStorage.getItem('salary')) || 0;

    // Function to add a new expense
    function addExpense(amount, salaryAmount, paymentMethod, date) {
      let newExpense = {
        id: expenses.length + 1,
        amount: amount,
        paymentMethod: paymentMethod,
        date: date,
      };
      expenses.push(newExpense); 
      localStorage.setItem('expenses', JSON.stringify(expenses));
      localStorage.setItem('salary', JSON.stringify(salaryAmount));
    }

    // Handle form submission
    document.getElementById("expenseForm").addEventListener("submit", function(event) {
      event.preventDefault();
      let amount = document.getElementById("amount").value;
      let salaryAmount = document.getElementById("salary").value;
      let paymentMethod = document.getElementById("paymode").value;
      let date = document.getElementById("date").value;

      addExpense(amount, salaryAmount,  paymentMethod, date); 

      let choice = prompt("Where do you want to go next?\nType '1' for Expense List or '2' for Graph View");
      if (choice === '1') {
        window.location.href = 'display.html';
      } else if (choice === '2') {
        window.location.href = 'garph.html';
      } else {
        alert('Invalid choice! Please type 1 or 2.');
      }
    });
  </script>
