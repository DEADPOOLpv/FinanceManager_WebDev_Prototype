<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>Expenditure Breakdown</title>
</head>
<body>
    <div class="container mt-4">
        <h3>Your Expenditure Breakdown</h3>
        <canvas id="expenditureChart" width="400" height="400"></canvas>
    </div>

    <script>
        // Categories to track
        const categories = ['Food', 'Savings', 'Entertainment', 'Debt'];

        // Retrieve category-wise expenses from localStorage
        let categoryExpenses = JSON.parse(localStorage.getItem('categoryExpenses')) || {
            Food: 0,
            Savings: 0,
            Entertainment: 0,
            Debt: 0
        };

        // Prepare data for the pie chart
        let expensesData = categories.map(category => categoryExpenses[category]);

        // Calculate total expenses
        let totalExpenses = expensesData.reduce((sum, expense) => sum + expense, 0);

        // Retrieve salary from localStorage (defaulting to 0 if not set)
        let salary = JSON.parse(localStorage.getItem('salary')) || 0;

        // Calculate remaining salary after expenses
        let remainingSalary = salary - totalExpenses;

        // Add 'Remaining Salary' to chart if positive
        if (remainingSalary > 0) {
            expensesData.push(remainingSalary);
            categories.push('Remaining Salary');
        }

        // Create the pie chart
        const ctx = document.getElementById('expenditureChart').getContext('2d');
        const expenditureChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: categories,
                datasets: [{
                    label: 'Expenditure Distribution',
                    data: expensesData,
                    backgroundColor: ['#ff6384', '#36a2eb', '#cc65fe', '#ffce56', '#ff9f40', '#4bc0c0'], // Color for each category
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    title: {
                        display: true,
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let value = context.raw;
                                return 'Amount: ' + value.toLocaleString(); 
                            }
                        }
                    }
                }
            }
        });
        window.onload = function() {
              localstorage.removeItem('categoryExpenses');
              localstorage.removeItem('expenditureChart');
        };
    </script>
</body>
</html>
